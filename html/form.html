<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>فرم عضویت</title>

    <link rel="stylesheet" href="/css/form.css">

    <script src="/js/form.js" defer></script>

</head>


<body>


<section>

    <form id="form">


        <header>

            <h1>فرم عضویت</h1>

        </header>



        <main>


            <div class="field">

                <label for="name">
                    نام
                </label>

                <input 
                type="text"
                id="name"
                data-bs-valid="empty"
                onblur="validation(event)"
                placeholder="نام خود را وارد کنید">

                <span></span>

            </div>



            <div class="field">


                <label for="last_name">
                    نام خانوادگی
                </label>


                <input
                type="text"
                id="last_name"
                data-bs-valid="empty"
                onblur="validation(event)"
                placeholder="نام خانوادگی خود را وارد کنید">


                <span></span>


            </div>





            <div class="field">


                <label for="email">
                    ایمیل
                </label>


                <input
                type="email"
                id="email"
                data-bs-valid="empty,email"
                onblur="validation(event)"
                onkeyup="validation(event)"
                placeholder="ایمیل خود را وارد کنید">


                <span></span>


            </div>





            <div class="field">


                <label for="phone">
                    شماره تماس
                </label>


                <input
                type="text"
                id="phone"
                data-bs-valid="empty,number"
                onblur="validation(event)"
                onkeyup="validation(event)"
                placeholder="شماره تماس خود را وارد کنید">


                <span></span>


            </div>



        </main>




        <footer>


            <button type="submit">

                ارسال

            </button>


        </footer>


    </form>


</section>


</body>

</html>
